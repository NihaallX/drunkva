<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Drunkva - Offline</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
        background: #000;
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100dvh;
      }
      .card {
        text-align: center;
        padding: 32px 24px;
        max-width: 360px;
        border: 1px solid #2d2d2d;
        background: #111;
        border-radius: 16px;
      }
      .logo {
        width: 72px;
        height: 72px;
        margin: 0 auto 16px;
      }
      .title {
        font-size: 18px;
        font-weight: 600;
        margin: 0 0 8px;
      }
      .subtitle {
        font-size: 14px;
        color: #a3a3a3;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <img class="logo" src="/icons/drunkva-192.png" alt="Drunkva" />
      <p class="title">You're offline</p>
      <p class="subtitle">Open the app when you're back online.</p>
    </div>
  </body>
</html>
